global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ingestion-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ingestion-service:8081]

  - job_name: analysis-service
    metrics_path: /metrics
    static_configs:
      - targets: [analysis-service:8082]

  - job_name: rabbitmq
    static_configs:
      - targets: [rabbitmq:15692]

  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: [gateway:8080]
